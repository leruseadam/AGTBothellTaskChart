<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dock Log — Inventory Intake</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:   #1a4228;
    --forest-mid: #2d6a3f;
    --forest-light: #4a8c5c;
    --orange:   #e8821a;
    --orange-dark: #c96d10;
    --cream:    #f5ead0;
    --ink:      #1c2e1e;
    --line:     rgba(26,66,40,0.14);
    --paper:    #fdf8f0;
    --muted:    #7a6a50;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: #0f2b1a;
    background-image: linear-gradient(180deg, #0f2b1a 0%, #1a4228 40%, #2d6a3f 100%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    padding: 28px 18px 80px;
  }
  .wrap{ max-width: 1180px; margin: 0 auto; }

  /* HEADER */
  header.top{
    display:flex; align-items:flex-end; justify-content:space-between;
    flex-wrap:wrap; gap:16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 2px solid rgba(245,234,208,0.18);
  }
  .logo-row{ display:flex; align-items:center; gap:14px; }
  .shield{ width:48px; height:52px; flex-shrink:0; }
  .brand-eyebrow{
    font-family:'Oswald', sans-serif;
    font-size:10px; letter-spacing:.28em; text-transform:uppercase;
    color: var(--orange); margin:0 0 5px; font-weight:400;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:700; text-transform:uppercase; letter-spacing:.02em;
    font-size: clamp(26px,4vw,44px);
    color: var(--cream);
    margin:0; line-height:1;
  }
  h1 span{ color: var(--orange); }
  .sub{
    color: rgba(245,234,208,0.55);
    font-size:12px; margin-top:7px; letter-spacing:.01em;
  }
  .stat-block{ display:flex; gap:22px; align-items:flex-end; }
  .stat{ text-align:right; }
  .stat .n{ font-family:'Oswald',sans-serif; font-size:30px; color:var(--cream); font-weight:600; line-height:1;}
  .stat .l{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(245,234,208,0.5); margin-top:4px;}

  /* DAY CARD */
  .vendor-card{
    background: var(--paper);
    border-radius: 10px;
    margin-bottom: 28px;
    box-shadow: 0 20px 40px -12px rgba(10,30,16,0.55), 0 0 0 1px rgba(0,0,0,0.07);
    position: relative;
    overflow: hidden;
    animation: rise .35s ease both;
  }
  @keyframes rise{ from{opacity:0; transform: translateY(10px);} to{opacity:1; transform:none;} }

  .vendor-card::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:6px;
    background: var(--card-accent, var(--forest-mid));
  }

  .vendor-head{
    display:flex; align-items:center; justify-content:space-between;
    gap: 14px; flex-wrap: wrap;
    padding: 16px 20px 14px 26px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(135deg, rgba(26,66,40,0.04) 0%, transparent 60%);
  }
  .vendor-id-row{ display:flex; align-items:center; gap:14px; flex:1; min-width: 220px;}
  .vendor-tag-icon{
    font-family:'Oswald', sans-serif; font-size: 11px; color: #fff;
    background: var(--forest); padding: 3px 8px; border-radius: 3px; letter-spacing:.08em;
    flex-shrink:0;
  }

  /* CALENDAR DATE BADGE */
  .date-badge{
    display:flex; align-items:stretch; flex-shrink:0;
    border: 2px solid var(--card-accent, var(--forest-mid));
    border-radius: 8px; overflow:hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .date-badge .dow{
    font-family:'Oswald', sans-serif; font-size: 11px; font-weight:600;
    letter-spacing:.1em; text-transform:uppercase; color: #fff;
    background: var(--card-accent, var(--forest-mid));
    padding: 5px 11px; display:flex; align-items:center; justify-content:center;
  }
  .date-badge .dom-wrap{
    position:relative; display:flex; align-items:center; padding: 4px 12px;
  }
  .date-badge .dom-display{
    font-family:'Oswald', sans-serif; font-weight:700; font-size: 21px;
    color: var(--ink); white-space:nowrap; pointer-events:none;
  }
  .date-badge .date-input{
    position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; border:none;
  }
  .date-badge:hover .dom-display{ color: var(--orange-dark); }

  .vendor-name-input{
    font-family:'Oswald', sans-serif; font-weight:600; font-size: 21px;
    text-transform: uppercase; letter-spacing:.01em;
    background:transparent; border:none; border-bottom: 2px solid transparent;
    color: var(--ink); width: 100%; padding: 2px 0;
    transition: border-color .15s;
  }
  .vendor-name-input:hover{ border-bottom-color: var(--line); }
  .vendor-name-input:focus{ outline:none; border-bottom-color: var(--orange); }

  .vendor-meta-input{
    font-family:'Inter', sans-serif; font-size: 12px; color: var(--muted);
    background: rgba(26,66,40,0.06); border: 1px solid transparent; border-radius:5px;
    padding: 5px 9px; min-width: 130px;
  }
  .vendor-meta-input:focus{ outline:none; border-color: rgba(26,66,40,0.2); }

  .progress-pill{
    font-family:'Inter', sans-serif; font-size: 12px; font-weight:600;
    padding: 5px 12px; border-radius: 20px; letter-spacing:.02em;
    display:flex; align-items:center; gap:7px; white-space:nowrap;
  }
  .progress-pill .dot{ width:7px; height:7px; border-radius:50%; }

  .del-btn{
    background:none; border:none; cursor:pointer; color:#bbb;
    font-size: 17px; line-height:1; padding: 4px 6px; border-radius:5px;
    transition: color .15s, background .15s;
  }
  .del-btn:hover{ color: #c0392b; background: rgba(192,57,43,0.08); }

  /* GRID */
  .grid-scroll{ overflow-x:auto; padding: 2px 0 16px; }
  .grid{
    display:grid;
    grid-template-columns: minmax(170px,1.3fr) repeat(8, minmax(96px,1fr));
    min-width: 920px;
  }
  .corner{ padding: 10px 20px 7px 26px; }
  .col-head{
    font-family:'Inter', sans-serif;
    font-size: 10px; font-weight:600; letter-spacing:.06em; line-height:1.3;
    color: var(--forest-mid); text-transform: uppercase;
    padding: 10px 8px 8px;
    text-align:center;
    border-left: 1px dashed rgba(26,66,40,0.15);
  }
  .col-head .step-num{
    display:block; font-size:9px; color: var(--orange); margin-bottom:3px; letter-spacing:.15em;
  }

  .order-row{ display:contents; }
  .order-label-cell{
    padding: 11px 12px 11px 26px;
    display:flex; align-items:center; gap:10px;
    border-top: 1px solid var(--line);
  }
  .order-num{
    font-family:'Oswald', sans-serif; font-size:11px; font-weight:600;
    color: #fff;
    background: var(--card-accent, var(--forest-mid)); width:22px; height:22px;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .order-name-input{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:14px;
    text-transform: uppercase; letter-spacing:.03em;
    background:transparent; border:none; color: var(--ink); width:100%;
    border-bottom: 1px solid transparent;
  }
  .order-name-input:hover{ border-bottom-color: var(--line); }
  .order-name-input:focus{ outline:none; border-bottom-color: var(--orange); }

  .cell{
    display:flex; align-items:center; justify-content:center;
    border-top: 1px solid var(--line);
    border-left: 1px dashed rgba(26,66,40,0.12);
    padding: 9px 6px;
  }

  .check{
    width: 30px; height:30px; cursor:pointer; position:relative;
    border: 2px solid #c8d8c4; border-radius: 6px; background: rgba(255,255,255,0.6);
    transition: transform .12s, border-color .15s, background .15s, box-shadow .15s;
    flex-shrink:0;
  }
  .check:hover{ border-color: var(--orange); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(232,130,26,0.2); }
  .check.done{
    background: var(--card-accent, var(--forest-mid));
    border-color: var(--card-accent, var(--forest-mid));
    transform: rotate(-3deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .check.done::after{
    content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color: #fff; font-size: 17px; font-weight:700;
  }

  .row-del-cell{ display:flex; align-items:center; justify-content:center; border-top:1px solid var(--line);}

  /* TODAY HIGHLIGHT */
  .today-card{
    box-shadow: 0 20px 40px -12px rgba(10,30,16,0.55), 0 0 0 2px rgba(232,130,26,0.5);
  }
  .today-badge{
    font-family:'Oswald', sans-serif; font-size:10px; font-weight:700; letter-spacing:.12em;
    text-transform:uppercase; color: #fff;
    background: var(--orange); padding: 3px 8px; border-radius: 20px;
    flex-shrink:0;
  }
  .full-date-label{
    font-family:'Inter', sans-serif; font-size:12px; color: var(--muted);
    white-space:nowrap; flex-shrink:0;
  }
  .old-card{ opacity: 0.82; }
  .old-card:hover{ opacity: 1; transition: opacity .2s; }

  /* EMPTY DAY — greyed out */
  .empty-day-card{
    opacity: 0.45;
    filter: grayscale(0.4);
    transition: opacity .2s, filter .2s;
  }
  .empty-day-card:hover{
    opacity: 0.75;
    filter: grayscale(0.1);
  }
  .empty-day-card .vendor-head{
    background: rgba(0,0,0,0.02);
  }
  .empty-day-card{ opacity: 0.45; filter: grayscale(0.3); }
  .empty-day-card:hover{ opacity: 0.75; filter: grayscale(0); transition: opacity .2s, filter .2s; }

  /* EMPTY DAY PLACEHOLDER */
  .empty-day-row{
    padding: 18px 26px;
    font-size: 12px; color: var(--muted); font-style:italic;
    border-top: 1px solid var(--line);
  }
  .empty-day-row strong{ font-style:normal; color: var(--forest-mid); }

  .add-order-row{
    padding: 12px 20px 16px 26px;
    background: linear-gradient(to bottom, transparent, rgba(26,66,40,0.03));
  }
  .add-order-btn{
    font-family:'Oswald', sans-serif; font-size: 12px; font-weight:500; letter-spacing:.06em;
    text-transform:uppercase;
    background: none; border: 1.5px dashed rgba(26,66,40,0.25); color: var(--forest-light);
    padding: 8px 15px; border-radius: 6px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .add-order-btn:hover{ border-color: var(--orange); color: var(--orange-dark); background: rgba(232,130,26,0.05); }
  .add-order-btn .plus{ font-size:15px; font-weight:700; }

  /* ADD VENDOR GLOBAL */
  .add-vendor-bar{
    display:flex; justify-content:center; margin-top: 10px;
  }
  .add-vendor-btn{
    font-family:'Oswald', sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    font-size: 14px; color: var(--forest);
    background: linear-gradient(135deg, var(--orange) 0%, #f0a030 100%);
    border:none; border-radius: 8px; padding: 14px 30px; cursor:pointer;
    display:flex; align-items:center; gap:9px;
    box-shadow: 0 8px 20px -6px rgba(232,130,26,0.6);
    transition: transform .12s, box-shadow .12s, filter .12s;
  }
  .add-vendor-btn:hover{ transform: translateY(-2px); filter:brightness(1.06); box-shadow: 0 12px 24px -6px rgba(232,130,26,0.65); }
  .add-vendor-btn .plus{ font-size:19px; line-height:1; }

  .empty-state{
    text-align:center; padding: 70px 20px; color: rgba(245,234,208,0.55);
    font-size:13px;
  }
  .empty-state .big{
    font-family:'Oswald',sans-serif; font-size:24px; color: var(--cream);
    text-transform:uppercase; display:block; margin-bottom:8px; letter-spacing:.05em;
  }

  footer.note{
    text-align:center; margin-top: 36px;
    font-size: 11px; letter-spacing:.06em;
    color: rgba(245,234,208,0.35);
  }

  ::-webkit-scrollbar{ height:7px; }
  ::-webkit-scrollbar-thumb{ background: rgba(26,66,40,0.25); border-radius:4px; }

  @media (max-width: 640px){
    .vendor-meta-input{ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="logo-row">
        <svg class="shield" viewBox="0 0 48 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 2L4 10v16c0 12 9 22 20 26 11-4 20-14 20-26V10L24 2z" fill="#1a4228" stroke="#e8821a" stroke-width="1.5"/>
          <path d="M24 8L8 15v12c0 9 7 17 16 20 9-3 16-11 16-20V15L24 8z" fill="#2d6a3f"/>
          <!-- sun rays -->
          <line x1="24" y1="14" x2="24" y2="10" stroke="#e8821a" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="30" y1="16" x2="33" y2="13" stroke="#e8821a" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="18" y1="16" x2="15" y2="13" stroke="#e8821a" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="33" y1="22" x2="37" y2="22" stroke="#e8821a" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="15" y1="22" x2="11" y2="22" stroke="#e8821a" stroke-width="1.2" stroke-linecap="round"/>
          <!-- mountain -->
          <polygon points="24,19 30,29 18,29" fill="#f5ead0"/>
          <polygon points="19,24 14,29 24,29" fill="#c8d8c4"/>
          <!-- trees -->
          <polygon points="12,37 15,30 18,37" fill="#f5ead0"/>
          <polygon points="30,37 33,30 36,37" fill="#f5ead0"/>
        </svg>
        <div>
          <p class="brand-eyebrow">A Greener Today · Receiving</p>
          <h1>Dock <span>Log</span></h1>
        </div>
      </div>
      <p class="sub">One grid per day · check off each step as a vendor's order clears the dock</p>
    </div>
    <div class="stat-block">
      <div class="stat"><div class="n" id="statOrders">0</div><div class="l">Vendor Orders</div></div>
      <div class="stat"><div class="n" id="statDone">0</div><div class="l">Fully Cleared</div></div>
    </div>
  </header>

  <div id="vendorList"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <span class="big">Dock is clear</span>
    Add a day to start logging incoming vendor orders.
  </div>

  <div class="add-vendor-bar">
    <button class="add-vendor-btn" id="addVendorBtn"><span class="plus">+</span> Add Vendor</button>
  </div>

  <footer class="note">SHARED LOG — visible to everyone with this link · changes save automatically</footer>
</div>

<script>
const STEPS = [
  "Pay / Sign",
  "Count Order",
  "Upload Manifest",
  "Sam Confirms",
  "Make Space",
  "Gather Tags",
  "Backstock",
  "Add Slips"
];

const ACCENTS = ['#2d6a3f','#1a5c40','#3a7a45','#4a8c5c','#1e6b4a','#2a5c35'];

const STORAGE_KEY = 'dock-log-vendors-v1';
let state = { vendors: [] };

function uid(){ return Math.random().toString(36).slice(2,9); }

function toISO(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function todayISO(){
  return toISO(new Date());
}

// Returns last N business days (Mon–Fri) including today if weekday, newest first
function lastNBusinessDays(n){
  const days = [];
  const d = new Date();
  while(days.length < n){
    const dow = d.getDay(); // 0=Sun,6=Sat
    if(dow !== 0 && dow !== 6) days.push(toISO(d));
    d.setDate(d.getDate() - 1);
  }
  return days; // already newest-first
}

// Most recent business day (today or last Friday)
function latestBusinessDay(){
  const d = new Date();
  while(d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate()-1);
  return toISO(d);
}

function isToday(iso){ return iso === todayISO(); }

function newVendor(date=''){
  return {
    id: uid(),
    date: date || todayISO(),
    po: '',
    accent: ACCENTS[0],
    orders: []
  };
}
function newOrder(){
  return { id: uid(), label: '', steps: Array(STEPS.length).fill(false) };
}

function formatDate(iso){
  if(!iso) return { dow:'???', dom:'Set date', full:'' };
  const parts = iso.split('-').map(Number);
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  if(isNaN(d.getTime())) return { dow:'???', dom:'Set date', full:'' };
  const dow = d.toLocaleDateString(undefined,{ weekday:'short' }).toUpperCase();
  const mon = d.toLocaleDateString(undefined,{ month:'short' }).toUpperCase();
  const full = d.toLocaleDateString(undefined,{ weekday:'long', month:'long', day:'numeric' });
  return { dow, dom: mon + ' ' + d.getDate(), full };
}

async function load(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      state = JSON.parse(res.value);
    }
  }catch(e){
    state = { vendors: [] };
  }
  migrate();
  seedBusinessDays();
  render();
}

function seedBusinessDays(){
  const days = lastNBusinessDays(5);
  days.forEach(dateISO => {
    if(!state.vendors.find(v => v.date === dateISO)){
      state.vendors.push(newVendor(dateISO));
    }
  });
}

function migrate(){
  if(!state.vendors) state.vendors = [];
  state.vendors.forEach(v=>{
    if(!v.date){
      // legacy card: old "name" was the vendor name, now lives on the row
      if(v.name && v.orders && v.orders[0] && !v.orders[0].label){
        v.orders[0].label = v.name;
      }
      v.date = todayISO();
      delete v.name;
    }
  });
}

let saveTimer = null;
async function save(){
  showToast('Saving…', true);
  const payload = JSON.stringify(state);
  const attempt = async ()=> {
    const result = await window.storage.set(STORAGE_KEY, payload, true);
    if(!result) throw new Error('Storage set returned empty result');
    return result;
  };
  try{
    await attempt();
    showToast('Saved', false);
  }catch(e){
    console.error('save failed, retrying once', e);
    try{
      await new Promise(r=>setTimeout(r, 600));
      await attempt();
      showToast('Saved', false);
    }catch(e2){
      console.error('save failed again', e2);
      showToast('Save failed — changes kept on screen, will retry', false, true);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(save, 4000);
    }
  }
}

let toastEl = null;
function showToast(msg, persistent, isError){
  if(!toastEl){
    toastEl = document.createElement('div');
    toastEl.style.cssText = `
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.03em;
      padding:9px 16px; border-radius:20px; z-index:9999;
      transition: opacity .25s, background .2s, color .2s;
      box-shadow: 0 8px 20px -6px rgba(0,0,0,0.4);
    `;
    document.body.appendChild(toastEl);
  }
  toastEl.textContent = msg;
  toastEl.style.background = isError ? '#c0392b' : '#1a4228';
  toastEl.style.color = '#f6f1e3';
  toastEl.style.opacity = '1';
  clearTimeout(toastEl._hideTimer);
  if(!persistent){
    toastEl._hideTimer = setTimeout(()=>{ toastEl.style.opacity='0'; }, isError ? 3500 : 1100);
  }
}

function computeStats(){
  let orders=0, done=0;
  state.vendors.forEach(v=>{
    v.orders.forEach(o=>{
      orders++;
      if(o.steps.every(s=>s)) done++;
    });
  });
  document.getElementById('statOrders').textContent = orders;
  document.getElementById('statDone').textContent = done;
}

function render(){
  const list = document.getElementById('vendorList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  empty.style.display = 'none'; // always have 5 days now

  const sorted = [...state.vendors].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const bizDays = lastNBusinessDays(5);

  sorted.forEach((v, vi)=>{
    const isBizDay = bizDays.includes(v.date);
    const todayCard = isToday(v.date);
    const card = document.createElement('div');
    card.className = 'vendor-card' + (todayCard ? ' today-card' : '') + (!isBizDay ? ' old-card' : '') + (v.orders.length === 0 ? ' empty-day-card' : '');
    card.setAttribute('data-vendor-id', v.id);
    card.style.setProperty('--card-accent', todayCard ? '#e8821a' : '#2d6a3f');

    const totalSteps = v.orders.length * STEPS.length;
    const doneSteps = v.orders.reduce((s,o)=> s + o.steps.filter(Boolean).length, 0);
    const pct = totalSteps ? Math.round(doneSteps/totalSteps*100) : 0;
    const pillColor = pct === 100 ? '#2d6a3f' : (pct === 0 ? '#a8978a' : '#e8821a');
    const fd = formatDate(v.date);
    const todayBadge = todayCard ? `<span class="today-badge">Today</span>` : '';

    card.innerHTML = `
      <div class="vendor-head">
        <div class="vendor-id-row">
          <div class="date-badge">
            <span class="dow">${fd.dow}</span>
            <span class="dom-wrap">
              <span class="dom-display">${fd.dom}</span>
              <input type="date" class="date-input" value="${escapeAttr(v.date)}" data-role="vdate" />
            </span>
          </div>
          ${todayBadge}
          <span class="full-date-label">${fd.full}</span>
          <input class="vendor-meta-input" placeholder="Truck / Ref #" value="${escapeAttr(v.po)}" data-role="vpo" />
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          ${v.orders.length ? `<div class="progress-pill" style="background:${pillColor}22; color:${pillColor};">
            <span class="dot" style="background:${pillColor};"></span> ${pct}% · ${doneSteps}/${totalSteps}
          </div>` : ''}
          <button class="del-btn" data-role="delvendor" title="Clear this day">✕</button>
        </div>
      </div>

      <div class="grid-scroll" ${v.orders.length ? '' : 'style="display:none"'}>
        <div class="grid" data-role="grid">
          <div class="corner"></div>
          ${STEPS.map((s,i)=>`<div class="col-head"><span class="step-num">${String(i+1).padStart(2,'0')}</span>${s}</div>`).join('')}
        </div>
      </div>

      ${v.orders.length === 0 ? `<div class="empty-day-row">No vendors logged yet — click <strong>+ Add Vendor</strong> below to start.</div>` : ''}

      <div class="add-order-row">
        <button class="add-order-btn" data-role="addorder"><span class="plus">+</span> Add Vendor</button>
      </div>
    `;

    // build rows into the grid (appended after header cells, using same grid container)
    const grid = card.querySelector('[data-role="grid"]');
    v.orders.forEach((o, oi)=>{
      const labelCell = document.createElement('div');
      labelCell.className = 'order-label-cell';
      labelCell.innerHTML = `
        <span class="order-num">${oi+1}</span>
        <input class="order-name-input" placeholder="Vendor name" value="${escapeAttr(o.label)}" data-role="oname" />
      `;
      grid.appendChild(labelCell);

      STEPS.forEach((s, si)=>{
        const cell = document.createElement('div');
        cell.className = 'cell';
        const box = document.createElement('div');
        box.className = 'check' + (o.steps[si] ? ' done' : '');
        box.title = s;
        box.addEventListener('click', ()=>{
          o.steps[si] = !o.steps[si];
          save();
          render();
        });
        cell.appendChild(box);
        grid.appendChild(cell);
      });

      // wire order name + delete via a small overlay approach: put delete button inline by re-styling label cell
      const onameInput = labelCell.querySelector('[data-role="oname"]');
      onameInput.addEventListener('change', ()=>{ o.label = onameInput.value; save(); });
    });

    // date/truck ref
    const vdateInput = card.querySelector('[data-role="vdate"]');
    vdateInput.addEventListener('change', ()=>{ v.date = vdateInput.value; save(); render(); });
    const vpoInput = card.querySelector('[data-role="vpo"]');
    vpoInput.addEventListener('change', ()=>{ v.po = vpoInput.value; save(); });

    card.querySelector('[data-role="delvendor"]').addEventListener('click', ()=>{
      if(v.orders.length === 0) return;
      if(confirm('Clear all vendor orders from ' + fd.full + '?')){
        v.orders = [];
        save(); render();
      }
    });

    card.querySelector('[data-role="addorder"]').addEventListener('click', ()=>{
      addVendorToDate(v.date);
    });

    list.appendChild(card);
  });

  computeStats();
}

function escapeAttr(s){
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

document.getElementById('addVendorBtn').addEventListener('click', ()=>{
  addVendorToDate(latestBusinessDay());
});

function addVendorToDate(dateISO){
  let v = state.vendors.find(x=>x.date === dateISO);
  if(!v){
    v = newVendor(dateISO);
    state.vendors.push(v);
  }
  v.orders.push(newOrder());
  save(); render();
  setTimeout(()=>{
    const card = document.querySelector(`[data-vendor-id="${v.id}"]`);
    const inputs = card ? card.querySelectorAll('.order-name-input') : document.querySelectorAll('.order-name-input');
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

load();
</script>
</body>
</html>
